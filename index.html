<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autumn Speech Notes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍂 Autumn Speech Notes</h1>
            <p class="subtitle">Capture your thoughts with your voice</p>
        </header>

        <div class="speech-section">
            <div class="control-panel">
                <button id="startBtn" class="btn btn-start">
                    <span class="icon">🎤</span>
                    Start Listening
                </button>
                <button id="stopBtn" class="btn btn-stop" disabled>
                    <span class="icon">⏹️</span>
                    Stop Listening
                </button>
                <button id="clearBtn" class="btn btn-clear">
                    <span class="icon">🗑️</span>
                    Clear Text
                </button>
            </div>

            <div class="status-indicator">
                <span id="statusText">Ready to listen</span>
                <span id="statusDot" class="status-dot"></span>
            </div>

            <textarea 
                id="speechText" 
                class="speech-textarea" 
                placeholder="Click 'Start Listening' and speak... Your words will appear here."></textarea>

            <div class="save-section">
                <input 
                    type="text" 
                    id="noteTitle" 
                    class="note-title-input" 
                    placeholder="Enter note title (optional)">
                <button id="saveBtn" class="btn btn-save">
                    <span class="icon">💾</span>
                    Save Note
                </button>
            </div>
        </div>

        <div class="notes-section">
            <div class="notes-header">
                <h2>📝 Saved Notes</h2>
                <button id="clearAllBtn" class="btn btn-small">Clear All</button>
            </div>
            <div id="notesList" class="notes-list">
                <p class="empty-state">No notes yet. Start speaking to create your first note!</p>
            </div>
        </div>

        <div class="footer">
            <p>🍁 Powered by Fall</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
